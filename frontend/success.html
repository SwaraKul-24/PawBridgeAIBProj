<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Submitted - PawBridge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-green: #38512F;
      --beige-bg: #FEF5E7;
      --dark-brown: #3A3630;
      --light-green: #DFF5E1;
      --darker-beige: #F0DDBF;
      --orange-accent: #DEA773;
    }

    body {
      background-color: var(--beige-bg);
      color: var(--dark-brown);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar {
      background-color: var(--primary-green) !important;
    }

    .navbar-brand, .navbar-nav .nav-link {
      color: white !important;
    }

    .btn-primary {
      background-color: var(--primary-green);
      border-color: var(--primary-green);
      color: white;
    }

    .btn-primary:hover {
      background-color: #2d3f25;
      border-color: #2d3f25;
    }

    .success-container {
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
    }

    .success-card {
      background-color: var(--light-green);
      border-radius: 10px;
      padding: 60px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .success-icon {
      font-size: 4rem;
      color: var(--primary-green);
      margin-bottom: 20px;
    }

    .success-card h1 {
      color: var(--primary-green);
      margin-bottom: 20px;
    }

    .success-card p {
      color: var(--dark-brown);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    footer {
      background-color: var(--darker-beige);
      padding: 20px 0;
      margin-top: 60px;
      text-align: center;
      color: var(--dark-brown);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🐾 PawBridge</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="report.html">Report</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="success-container">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1>Report Submitted Successfully</h1>
      <p>Thank you for reporting! We've received your submission and will connect you with nearby NGOs who can help.</p>
      <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 PawBridge. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
